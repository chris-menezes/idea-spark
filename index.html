<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idea Spark</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 9999px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #8b5cf6; cursor: pointer; }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
<div class="w-full max-w-4xl">

  <div class="text-center mb-10">
    <h1 class="text-5xl font-black text-gray-900 mb-3">Idea Spark</h1>
    <p class="text-xl text-gray-500 font-medium">Words. Context. Endless possibilities.</p>
  </div>

  <div class="bg-white rounded-3xl p-8 shadow-sm">

    <!-- Word Inputs -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-gray-100 rounded-2xl p-5 relative">
        <label class="block text-xs font-bold mb-2 text-gray-400 uppercase tracking-widest">Word 1</label>
        <input id="word1" type="text" placeholder="ocean" class="w-full text-lg font-bold bg-transparent border-none outline-none text-black placeholder-gray-300 pr-7" />
        <button onclick="shuffleWord('word1')" class="absolute top-4 right-4 text-gray-300 hover:text-purple-500 transition-colors" title="Random">⇄</button>
      </div>
      <div class="bg-gray-100 rounded-2xl p-5 relative">
        <label class="block text-xs font-bold mb-2 text-gray-400 uppercase tracking-widest">Word 2</label>
        <input id="word2" type="text" placeholder="robot" class="w-full text-lg font-bold bg-transparent border-none outline-none text-black placeholder-gray-300 pr-7" />
        <button onclick="shuffleWord('word2')" class="absolute top-4 right-4 text-gray-300 hover:text-purple-500 transition-colors" title="Random">⇄</button>
      </div>
      <div class="bg-gray-100 rounded-2xl p-5 relative">
        <label class="block text-xs font-bold mb-2 text-gray-400 uppercase tracking-widest">Word 3 <span class="normal-case text-gray-300">(opt)</span></label>
        <input id="word3" type="text" placeholder="optional" class="w-full text-lg font-bold bg-transparent border-none outline-none text-black placeholder-gray-300 pr-7" />
        <button onclick="shuffleWord('word3')" class="absolute top-4 right-4 text-gray-300 hover:text-purple-500 transition-colors" title="Random">⇄</button>
      </div>
      <div class="bg-gray-100 rounded-2xl p-5">
        <label class="block text-xs font-bold mb-2 text-gray-400 uppercase tracking-widest">Location</label>
        <input id="location" type="text" placeholder="e.g. home, Phuket…" class="w-full text-lg font-bold bg-transparent border-none outline-none text-black placeholder-gray-300" />
      </div>
    </div>

    <!-- Categories -->
    <div class="grid grid-cols-4 gap-3 mb-6" id="categories">
      <button onclick="selectCat('business')"  data-cat="business"  class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">💼</div><div class="font-bold text-sm">Business</div></button>
      <button onclick="selectCat('writing')"   data-cat="writing"   class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">✍️</div><div class="font-bold text-sm">Creative writing</div></button>
      <button onclick="selectCat('products')"  data-cat="products"  class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">📦</div><div class="font-bold text-sm">Product ideas</div></button>
      <button onclick="selectCat('solutions')" data-cat="solutions" class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">🔧</div><div class="font-bold text-sm">Problem solving</div></button>
      <button onclick="selectCat('art')"       data-cat="art"       class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">🎨</div><div class="font-bold text-sm">Art & design</div></button>
      <button onclick="selectCat('stories')"   data-cat="stories"   class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">✨</div><div class="font-bold text-sm">Story concepts</div></button>
      <button onclick="selectCat('social')"    data-cat="social"    class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">🎉</div><div class="font-bold text-sm">Social activity</div></button>
      <button onclick="selectCat('solo')"      data-cat="solo"      class="cat-btn p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-all hover:scale-105"><div class="text-2xl mb-1">🧘</div><div class="font-bold text-sm">Solo activity</div></button>
    </div>

    <!-- Energy + Timing -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-gray-100 rounded-2xl px-6 py-4">
        <div class="flex justify-between items-center mb-3">
          <p class="font-bold text-gray-800 text-sm uppercase tracking-widest">Energy level</p>
          <span id="energyLabel" class="font-black text-sm text-purple-500">😊 Medium</span>
        </div>
        <input id="energy" type="range" min="1" max="10" value="5" oninput="updateEnergy()" class="w-full" />
        <div class="flex justify-between text-xs text-gray-300 mt-1"><span>😴 Couch</span><span>🔥 Beast mode</span></div>
      </div>
      <div class="bg-gray-100 rounded-2xl px-6 py-4 flex flex-col justify-center">
        <p class="font-bold text-gray-800 text-sm uppercase tracking-widest mb-3">Timing</p>
        <div class="flex bg-gray-200 rounded-xl p-1">
          <button id="btn-now"   onclick="setTiming('now')"   class="flex-1 py-2.5 rounded-lg font-black text-sm bg-purple-500 text-white shadow transition-all">⚡ Now</button>
          <button id="btn-later" onclick="setTiming('later')" class="flex-1 py-2.5 rounded-lg font-black text-sm text-gray-400 hover:text-gray-600 transition-all">📅 Later</button>
        </div>
        <p id="timingDesc" class="text-xs text-gray-400 mt-2">Immediate, no prep needed</p>
      </div>
    </div>

    <!-- NSFW Toggle -->
    <div class="flex items-center justify-between bg-gray-100 rounded-2xl px-6 py-4 mb-6">
      <div>
        <p class="font-bold text-gray-800">🔞 Adult / NSFW mode</p>
        <p class="text-sm text-gray-400">Unlocks mature, risqué, and explicit idea themes</p>
      </div>
      <button id="nsfwToggle" onclick="toggleNsfw()" class="relative w-14 h-7 rounded-full bg-gray-300 transition-colors duration-300">
        <span id="nsfwThumb" class="absolute top-1 left-1 w-5 h-5 bg-white rounded-full shadow transition-all duration-300"></span>
      </button>
    </div>

    <!-- Generate -->
    <button id="generateBtn" onclick="generateIdeas()" class="w-full bg-purple-500 hover:bg-purple-600 text-white py-5 rounded-2xl text-xl font-black transition-all duration-200 hover:scale-105 flex items-center justify-center gap-3">
      Generate ideas
    </button>

    <!-- Results -->
    <div id="results" class="hidden mt-8">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-2xl font-black text-purple-500">Your ideas</h3>
        <button onclick="resetAll()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl text-sm font-bold text-gray-600 transition-colors">Reset</button>
      </div>
      <div id="ideaList" class="grid gap-4"></div>
    </div>

  </div>
</div>

<script>
  const wordBank = ['robot','digital','quantum','virtual','neural','nano','eco','ocean','forest','mountain','solar','crystal','thunder','wind','fire','ice','mirror','bridge','tower','garden','library','kitchen','studio','workshop','invisible','magical','ancient','modern','tiny','giant','silent','colorful','transparent','flexible','dragon','phoenix','wolf','eagle','dolphin','butterfly','tiger','lion','bear','fox','midnight','dawn','sunset','eternal','instant','future','vintage','rapid','slow','glass','metal','wood','stone','fabric','paper','ceramic','diamond','gold','velvet','smoke','shadow','prism','echo','pulse'];
  const categoryContext = { business:'business opportunities, startups, or entrepreneurial ventures', writing:'creative writing prompts, story ideas, or narrative concepts', products:'new product concepts, improvements, or market opportunities', art:'artistic projects, design concepts, or creative visual ideas', solutions:'practical solutions to everyday problems or challenges', stories:'engaging story concepts, plot ideas, or narrative themes', social:'group activities, social events, party ideas, icebreakers, or shared experiences', solo:'solo activities, personal pursuits, self-directed experiences, or things to do alone' };
  const energyLevels = [ null, {l:'Very low',e:'😴'}, {l:'Very low',e:'😴'}, {l:'Low',e:'🌿'}, {l:'Low',e:'🌿'}, {l:'Medium',e:'😊'}, {l:'Medium',e:'😊'}, {l:'High',e:'⚡'}, {l:'High',e:'⚡'}, {l:'Max',e:'🔥'}, {l:'Max',e:'🔥'} ];

  let selectedCat = '', timing = 'now', nsfw = false;

  function shuffleWord(id) { document.getElementById(id).value = wordBank[Math.floor(Math.random()*wordBank.length)]; }

  function selectCat(cat) {
    selectedCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('bg-purple-500', b.dataset.cat === cat);
      b.classList.toggle('text-white', b.dataset.cat === cat);
      b.classList.toggle('shadow-lg', b.dataset.cat === cat);
      b.classList.toggle('bg-gray-100', b.dataset.cat !== cat);
    });
  }

  function updateEnergy() {
    const v = document.getElementById('energy').value;
    const { l, e } = energyLevels[v];
    document.getElementById('energyLabel').textContent = `${e} ${l}`;
  }

  function setTiming(t) {
    timing = t;
    document.getElementById('btn-now').className   = `flex-1 py-2.5 rounded-lg font-black text-sm transition-all ${t==='now'   ? 'bg-purple-500 text-white shadow' : 'text-gray-400 hover:text-gray-600'}`;
    document.getElementById('btn-later').className = `flex-1 py-2.5 rounded-lg font-black text-sm transition-all ${t==='later' ? 'bg-purple-500 text-white shadow' : 'text-gray-400 hover:text-gray-600'}`;
    document.getElementById('timingDesc').textContent = t === 'now' ? 'Immediate, no prep needed' : 'Plan ahead, something to look forward to';
  }

  function toggleNsfw() {
    nsfw = !nsfw;
    document.getElementById('nsfwToggle').style.backgroundColor = nsfw ? '#8b5cf6' : '';
    document.getElementById('nsfwToggle').classList.toggle('bg-purple-500', nsfw);
    document.getElementById('nsfwToggle').classList.toggle('bg-gray-300', !nsfw);
    document.getElementById('nsfwThumb').style.left = nsfw ? '2rem' : '0.25rem';
  }

  async function generateIdeas() {
    const w1 = document.getElementById('word1').value.trim();
    const w2 = document.getElementById('word2').value.trim();
    const w3 = document.getElementById('word3').value.trim();
    const loc = document.getElementById('location').value.trim();
    const energy = document.getElementById('energy').value;
    if (!w1 || !w2 || !selectedCat) { alert('Please enter at least 2 words and select a category.'); return; }

    const btn = document.getElementById('generateBtn');
    btn.textContent = 'Generating…';
    btn.disabled = true;

    const words = [w1, w2, w3].filter(Boolean).map(w => `"${w}"`).join(', ');
    const { l: eLabel } = energyLevels[energy];
    const locationStr = loc ? `The location/setting is: ${loc}.` : '';
    const timingStr = timing === 'now' ? 'These ideas should be immediately actionable — no planning or prep required.' : 'These ideas can involve planning ahead — something to look forward to or prepare for.';
    const nsfwStr = nsfw ? 'You may include adult-oriented, risqué, or NSFW ideas — be creative and uninhibited.' : 'Keep all ideas appropriate for general audiences.';

    const prompt = `Generate 5-7 creative ideas that fuse the words ${words} for ${categoryContext[selectedCat]}.

Context:
- Energy level: ${eLabel} (${energy}/10) — tailor the physical/mental effort accordingly.
- Timing: ${timingStr}
${locationStr}
${nsfwStr}

Format as a numbered list using EXACTLY this format:
"1. [Idea Title] - [Detailed explanation in 1-2 sentences]"

Every idea MUST have both a title AND a description separated by " - ".`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      renderIdeas(data.text);
    } catch (e) {
      alert('Error generating ideas. Check your server is running.');
    } finally {
      btn.textContent = 'Generate ideas';
      btn.disabled = false;
    }
  }

  function renderIdeas(text) {
    const lines = text.split('\n').filter(l => l.trim() && /^\d+\./.test(l.trim()));
    const list = document.getElementById('ideaList');
    list.innerHTML = '';
    lines.forEach((line, idx) => {
      const clean = line.replace(/^\d+\.\s*/, '').trim();
      let title, desc;
      if (clean.includes(' - ')) { [title, ...desc] = clean.split(' - '); desc = desc.join(' - '); }
      else if (clean.includes(': ')) { [title, ...desc] = clean.split(': '); desc = desc.join(': '); }
      else { title = clean; desc = ''; }
      list.innerHTML += `
        <div class="bg-gradient-to-r from-purple-50 to-purple-100 border border-purple-200 rounded-2xl p-6 hover:shadow-md transition-all">
          <div class="flex items-start gap-4">
            <div class="w-8 h-8 bg-purple-500 text-white rounded-full flex items-center justify-center font-black text-sm flex-shrink-0">${idx+1}</div>
            <div>
              <h4 class="text-lg font-black text-purple-700 mb-1">${title.replace(/^["']|["']$/g,'')}</h4>
              ${desc ? `<p class="text-gray-700 leading-relaxed">${desc}</p>` : ''}
            </div>
          </div>
        </div>`;
    });
    document.getElementById('results').classList.remove('hidden');
  }

  function resetAll() {
    ['word1','word2','word3','location'].forEach(id => document.getElementById(id).value = '');
    selectedCat = ''; document.querySelectorAll('.cat-btn').forEach(b => { b.classList.add('bg-gray-100'); b.classList.remove('bg-purple-500','text-white','shadow-lg'); });
    document.getElementById('energy').value = 5; updateEnergy();
    setTiming('now'); nsfw = false;
    document.getElementById('nsfwToggle').classList.replace('bg-purple-500','bg-gray-300');
    document.getElementById('nsfwThumb').style.left = '0.25rem';
    document.getElementById('results').classList.add('hidden');
  }
</script>
</body>
</html>
